#============================================================
# cgroup.conf — 리소스 격리 설정
#============================================================

# cgroup v2 자동 감지 (Ubuntu 22.04+는 v2 기본)
CgroupPlugin=cgroup/v2

# 메모리 제한 강제
ConstrainRAMSpace=yes                # 메모리 초과 시 OOM kill
AllowedRAMSpace=100                  # 할당된 메모리의 100%까지 허용
MaxRAMPercent=98                     # 노드 전체 메모리의 98%까지 사용 가능

# 스왑 제한
ConstrainSwapSpace=yes               # 스왑도 제한
AllowedSwapSpace=0                   # 스왑 사용 금지 (GPU 학습에서 스왑 = 성능 재앙)

# CPU 격리
ConstrainCores=yes                   # 할당된 CPU 코어만 사용 가능

# 디바이스 격리 (GPU 핵심)
ConstrainDevices=yes                 # 할당된 GPU 디바이스만 접근 가능
