#============================================================
# 1. 클러스터 기본 정보
#============================================================
ClusterName=gpu-cluster
SlurmctldHost=controller-01
SlurmctldHost=controller-02          # HA 구성 시 백업 컨트롤러
SlurmUser=slurm
SlurmctldPort=6817
SlurmdPort=6818
StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd

#============================================================
# 2. 인증
#============================================================
AuthType=auth/munge
CredType=cred/munge

#============================================================
# 3. 스케줄링
#============================================================
SchedulerType=sched/backfill          # 백필 스케줄러 (빈 자원에 작은 잡 끼워넣기)
SelectType=select/cons_tres           # TRES 기반 리소스 선택 (GPU 필수)
SelectTypeParameters=CR_Core_Memory   # CPU 코어 + 메모리 단위 할당
GresTypes=gpu                         # Generic Resource로 GPU 사용

# 백필 관련
SchedulerParameters=bf_max_job_test=5000   # 백필 검사할 최대 잡 수
SchedulerParameters+=bf_interval=30        # 백필 주기 (초)

# 프리엠션
PreemptType=preempt/qos              # QOS 기반 선점
PreemptMode=REQUEUE                  # 선점 시 재큐잉
PreemptExemptTime=00:05:00           # 5분 이내 잡은 선점 안 함

#============================================================
# 4. 리소스 제한 / 어카운팅
#============================================================
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=controller-01
AccountingStorageEnforce=associations,limits,qos
JobAcctGatherType=jobacct_gather/cgroup    # cgroup으로 리소스 사용량 수집
JobAcctGatherFrequency=30                  # 30초마다 수집

#============================================================
# 5. 로깅
#============================================================
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldDebug=info
SlurmdDebug=info

#============================================================
# 6. 잡 기본값 / 제한
#============================================================
DefMemPerCPU=4096                    # CPU당 기본 메모리 (MB)
MaxMemPerCPU=8192                    # CPU당 최대 메모리
MaxJobCount=100000                   # 최대 잡 수
MaxArraySize=10000                   # 최대 어레이 잡 크기
MinJobAge=300                        # 완료된 잡 정보 유지 시간 (초)
MaxTime=72:00:00                     # 최대 실행 시간
DefaultTime=01:00:00                 # 기본 실행 시간

#============================================================
# 7. 프롤로그 / 에필로그
#============================================================
Prolog=/etc/slurm/prolog.sh          # 잡 시작 전 실행 (GPU 헬스체크 등)
Epilog=/etc/slurm/epilog.sh          # 잡 종료 후 실행 (GPU 리셋, 임시파일 정리)
PrologFlags=Alloc                    # 노드 할당 시 1회 실행

#============================================================
# 8. 헬스체크
#============================================================
HealthCheckProgram=/etc/slurm/healthcheck.sh
HealthCheckInterval=300              # 5분마다 체크
HealthCheckNodeState=IDLE            # idle 노드만 체크

#============================================================
# 9. Power Saving (클라우드 오토스케일링)
#============================================================
# ParallelCluster에서 자동 설정됨
# SuspendProgram=/opt/slurm/bin/suspend.sh
# ResumeProgram=/opt/slurm/bin/resume.sh
# SuspendTime=600                   # 10분 idle이면 노드 종료
# ResumeTimeout=300                 # 5분 내 노드 안 뜨면 실패

#============================================================
# 10. 노드 정의
#============================================================
# GPU 노드
NodeName=gpu-node-[001-100] CPUs=192 Boards=1 SocketsPerBoard=2 \
  CoresPerSocket=48 ThreadsPerCore=2 RealMemory=2048000 \
  Gres=gpu:h100:8 State=UNKNOWN

# CPU 전용 노드 (전처리용)
NodeName=cpu-node-[001-020] CPUs=96 RealMemory=384000 State=UNKNOWN

#============================================================
# 11. 파티션 정의
#============================================================
# GPU 학습용
PartitionName=gpu Nodes=gpu-node-[001-100] Default=YES \
  MaxTime=72:00:00 State=UP DefMemPerCPU=4096 \
  OverSubscribe=EXCLUSIVE            # 노드 독점 사용

# 인터랙티브 (디버깅/테스트)
PartitionName=interactive Nodes=gpu-node-[001-010] \
  MaxTime=04:00:00 State=UP MaxNodes=2 \
  PreemptMode=REQUEUE                # 학습 잡에 의해 선점 가능

# CPU 전처리
PartitionName=cpu Nodes=cpu-node-[001-020] \
  MaxTime=24:00:00 State=UP

# 우선순위 높은 파티션
PartitionName=priority Nodes=gpu-node-[001-100] \
  MaxTime=168:00:00 State=UP AllowQos=high-priority \
  PriorityTier=2
