# 대규모 학습에서 노드 간 통신(NCCL all-reduce)이 핵심이니까, 같은 스위치 아래 노드끼리 묶어주면 성능이 좋아진다.
# K8s에서 topology.kubernetes.io/rack 라벨 + Pod Affinity로 하는 것과 같은 역할인데, 
# Slurm은 스케줄러가 네이티브로 지원한다. 다만 실무에서는 이 파일을 정확하게 유지하는 게 번거롭기 때문에 소규모 클러스터에서는 쓰지 않는다.

#============================================================
# topology.conf — 네트워크 토폴로지 정의 (Fat-Tree 구조)
#============================================================

# Leaf (ToR) 스위치 — 노드에 직접 연결
SwitchName=leaf01 Nodes=gpu-node-[001-004]
SwitchName=leaf02 Nodes=gpu-node-[005-008]
SwitchName=leaf03 Nodes=gpu-node-[009-012]
SwitchName=leaf04 Nodes=gpu-node-[013-016]
SwitchName=leaf05 Nodes=gpu-node-[017-020]
SwitchName=leaf06 Nodes=gpu-node-[021-024]
SwitchName=leaf07 Nodes=gpu-node-[025-028]
SwitchName=leaf08 Nodes=gpu-node-[029-032]

# Spine 스위치 — Leaf 스위치에 연결
SwitchName=spine01 Switches=leaf01,leaf02,leaf03,leaf04
SwitchName=spine02 Switches=leaf05,leaf06,leaf07,leaf08

# Core 스위치 — Spine 스위치에 연결 (대규모 시)
SwitchName=core01 Switches=spine01,spine02
