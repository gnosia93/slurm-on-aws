Imds:
  ImdsSupport: v1.0
Image:
  Os: ubuntu2204
HeadNode:
  InstanceType: m5.8xlarge
  Networking:
    SubnetId: ${PUBLIC_SUBNET_ID}
    AdditionalSecurityGroups:
      - ${SECURITY_GROUP}
  LocalStorage:
    RootVolume:
      Size: 500
      DeleteOnTermination: true # that's your root and /home volume for users
  Iam:
    AdditionalIamPolicies: # grant ECR, SSM and S3 read access
      - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      - Policy: arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
      - Policy: arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
#      - Policy: arn:aws:iam::aws:policy/AmazonPrometheusRemoteWriteAccess
  CustomActions:
    OnNodeConfigured:
      Sequence:
        - Script: 'https://raw.githubusercontent.com/gnosia93/slurm-on-aws/refs/heads/main/setup/script/docker.sh'
        - Script: 'https://raw.githubusercontent.com/gnosia93/slurm-on-aws/refs/heads/main/setup/script/nccl.sh'
          Args:
            - v2.23.4-1 # NCCL version
            - v1.11.0-aws # AWS OFI NCCL version
  Imds:
    Secured: false
Scheduling:
  Scheduler: slurm
  SlurmSettings:
    ScaledownIdletime: 600                                     # 600초 동안 IDLE 상태가 지속되면, 인스턴스를 TERMINATE 시킨다.  
    QueueUpdateStrategy: DRAIN                                 # DRAIN: 클러스터 설정을 변경할 때, 실행 중인 작업은 끝날 때까지 기다리고 새 작업은 받지 않는 방식으로 안전하게 업데이트
    CustomSlurmSettings:
      - JobCompType: jobcomp/filetxt                           # 작업이 끝났을 때 그 기록을 텍스트 파일(.txt) 형태로 남기겠다는 설정.
      - JobCompLoc: /home/slurm/slurm-job-completions.txt      # 어떤 사용자가 어떤 스크립트를 돌렸고, 결과(성공/실패)가 어땠는지 한눈에 볼 수 있음.
      - JobAcctGatherType: jobacct_gather/linux                # 작업의 CPU 사용량, 메모리 점유율 같은 데이터를 수집하는 방식 설정 - linux 방식은 리눅스 커널의 표준 기능을 사용.
  SlurmQueues:
    - Name: compute-gpu
      CapacityType: ONDEMAND                                   # ONDEMAND or SPOT 
      Networking:
        SubnetIds:
          - ${PRIVATE_SUBNET_ID}
        PlacementGroup:
          Enabled: true                                        # set this to false if using a targeted ODCR or CB
        AdditionalSecurityGroups:
          - ${SECURITY_GROUP}
      ComputeSettings:
        LocalStorage:
          EphemeralVolume:
            MountDir: /scratch                                 # each instance has a local scratch on NVMe
          RootVolume:
            Size: 200
      JobExclusiveAllocation: true                             # GenAI training likes to gobble all GPUs in an instance
      ComputeResources:
        - Name: distributed-ml
          InstanceType: p5.48xlarge
          MinCount: 0                                          # if min = max then capacity is maintained and will
          MaxCount: 4                                          # not scale down
          Efa:
            Enabled: true
#         CapacityReservationTarget:
#           CapacityReservationId: cr-0123456789abcdef0        # 구매한 예약 ID (Capacity Block or ODCR ID) 
      CustomActions:
        OnNodeConfigured:
          Sequence:
            - Script: 'https://raw.githubusercontent.com/aws-samples/aws-parallelcluster-post-install-scripts/main/docker/postinstall.sh'
            - Script: 'https://raw.githubusercontent.com/aws-samples/aws-parallelcluster-post-install-scripts/main/nccl/postinstall.sh'
              Args:
                - v2.23.4-1 # NCCL version
                - v1.11.0-aws # AWS OFI NCCL version
SharedStorage:
  - Name: HomeDirs
    MountDir: /home
    StorageType: FsxOpenZfs
    FsxOpenZfsSettings:
      VolumeId: ${FSXO_ID}
  - MountDir: /fsx
    Name: fsx
    StorageType: FsxLustre
    FsxLustreSettings:
      FileSystemId: ${FSX_ID}
Monitoring:
  DetailedMonitoring: true
  Logs:
    CloudWatch:
      Enabled: true
  Dashboards:
    CloudWatch:
      Enabled: true
Tags:
  - Key: 'Grafana'
    Value: 'true'
