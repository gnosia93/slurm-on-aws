#!/bin/bash
set -e

export GPU_MIN=2
export GPU_MAX=2

cat > cluster.yaml << EOF
Imds:
  ImdsSupport: v1.0
Image:
  Os: ubuntu2204
HeadNode:
  InstanceType: ${HEAD_NODE_TYPE}
  Ssh:
    KeyName: slurm-key
  Networking:
    SubnetId: ${PUBLIC_SUBNET_ID}
    AdditionalSecurityGroups:
      - ${SECURITY_GROUP}
  LocalStorage:
    RootVolume:
      Size: 100
      DeleteOnTermination: true                 # that's your root and /home volume for users
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      - Policy: arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
      - Policy: arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      - Policy: arn:aws:iam::aws:policy/AmazonPrometheusRemoteWriteAccess
  CustomActions:
    OnNodeConfigured:
      Sequence:
#        - Script: 'https://raw.githubusercontent.com/gnosia93/slurm-on-aws/refs/heads/main/setup/script/stop-ssm.sh'
        - Script: 'https://raw.githubusercontent.com/gnosia93/slurm-on-aws/refs/heads/main/setup/script/docker.sh'
          Args:
            - 1.18.2-1                         # NVIDIA_CONTAINER_TOOLKIT_VERSION version
        - Script: 'https://raw.githubusercontent.com/gnosia93/slurm-on-aws/refs/heads/main/setup/script/slurm-exporter.sh'
  Imds:
    Secured: false
Scheduling:
  Scheduler: slurm
  SlurmSettings:
    ScaledownIdletime: 300               # Idle ьГБэГЬьЭШ ыЕ╕ыУЬьЭШ ъ▓╜ьЪ░ 5ы╢ДэЫД ьВньаЬ
    QueueUpdateStrategy: DRAIN           # эБ┤ыЯмьКдэД░ ьЧЕыН░ьЭ┤эК╕ьЛЬ DRAINьЭА ьЛдэЦЙ ьдСьЭ╕ ьЮСьЧЕьЭ┤ ыБЭыВа ыХМъ╣МьзА ыМАъ╕░эЫД ьЧЕыН░ьЭ┤эК╕, TERMINATEьЭА ьЛдэЦЙ ьдСьЭ╕ ьЮСьЧЕьЭД ьжЙьЛЬ ьвЕыгМэХШъ│а ы░ФыбЬ ьЧЕыН░ьЭ┤эК╕
    CustomSlurmSettings:
      #- SlurmdTimeout: 1800              # slurmctldъ░А slurmdьЭШ ьЭСыЛ╡ ь╡ЬыМА ыМАъ╕░ ьЛЬъ░Д(ь┤И), ьЭ┤ ьЛЬъ░Д ыВ┤ьЧР slurmdъ░А ьЭСыЛ╡эХШьзА ьХКьЬ╝ый┤, эХ┤ыЛ╣ ыЕ╕ыУЬые╝ DOWN ьГБэГЬыбЬ ьаДэЩШ, ъ╕░ы│╕ъ░Т 3ы╢Д(180)
      # Simple accounting to text file /home/slurm/slurm-job-completions.txt.
      - JobCompType: jobcomp/filetxt
      - JobCompLoc: /home/slurm/slurm-job-completions.txt
      - JobAcctGatherType: jobacct_gather/linux
  SlurmQueues:
    - Name: gpu
      CapacityType: ONDEMAND
      Networking:
        SubnetIds:
          - ${PRIVATE_SUBNET_ID}
        PlacementGroup:
          Enabled: true                  # set this to false if using a targeted ODCR
        AdditionalSecurityGroups:
          - ${SECURITY_GROUP}
      ComputeSettings:
        LocalStorage:
          EphemeralVolume:
            MountDir: /scratch           # each instance has a local scratch on NVMe
          RootVolume:
            Size: 200
      JobExclusiveAllocation: true       # GenAI training likes to gobble all GPUs in an instance
      ComputeResources:
        - Name: ml
          InstanceType: ${GPU_NODE_TYPE}
          MinCount: ${GPU_MIN}
          MaxCount: ${GPU_MAX}
          Efa:
            Enabled: true
      CustomActions:
        OnNodeConfigured:
          Sequence:
#            - Script: 'https://raw.githubusercontent.com/gnosia93/slurm-on-aws/refs/heads/main/setup/script/stop-ssm.sh'
            - Script: 'https://raw.githubusercontent.com/gnosia93/slurm-on-aws/refs/heads/main/setup/script/docker.sh'
              Args:
                - 1.18.2-1              # NVIDIA_CONTAINER_TOOLKIT_VERSION version
            - Script: 'https://raw.githubusercontent.com/gnosia93/slurm-on-aws/refs/heads/main/setup/script/nccl.sh'
              Args:
                - v2.29.2-1             # NCCL version
                - v1.18.0               # AWS OFI NCCL version
            - Script: 'https://raw.githubusercontent.com/gnosia93/slurm-on-aws/refs/heads/main/setup/script/enroot.sh'
            - Script: 'https://raw.githubusercontent.com/gnosia93/slurm-on-aws/refs/heads/main/setup/script/dcgm.sh'
#SharedStorage:
#  - Name: HomeDirs
#    MountDir: /home
#    StorageType: FsxOpenZfs
#    FsxOpenZfsSettings:
#      VolumeId: ${FSXO_ID}
#  - MountDir: /fsx
#    Name: fsx
#    StorageType: FsxLustre
#    FsxLustreSettings:
#      FileSystemId: ${FSX_ID}
Monitoring:
  DetailedMonitoring: false
  Logs:
    CloudWatch:
      Enabled: true # good for debug
  Dashboards:
    CloudWatch:
      Enabled: true # provide basic dashboards
Tags:
  - Key: 'Grafana'
    Value: 'true'
EOF
